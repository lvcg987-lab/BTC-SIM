  if (window.playablesSDK) return;

  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true

      message: (reason instanceof Error) ? reason.message : String(reason),

    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });

      sendEvent(eventName, payload);
    }

  if (originalRAF) {
    originalRAF.call(window, onFrame);

<script>
(() => {
const $ = id => document.getElementById(id);
const fmt = n => '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = n => '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});

const defaults = {price:0,prev:0,balance:10000,positions:[],orders:[],history:[],sma9:0,sma21:0,rsi:0,open24:0};
let state = loadState();
let mode = 'market';
let supabaseClient = null;

function loadState(){
  try{ const s=JSON.parse(localStorage.getItem('btc_sim_v3')||'null'); return s? {...defaults,...s,price:0,prev:0} : {...defaults}; }
  catch(e){ console.error('load',e); return {...defaults} }
}
function saveState(){
  try{ localStorage.setItem('btc_sim_v3', JSON.stringify({...state,price:0,prev:0})); syncCloud(); }catch(e){console.error(e)}
}

// Supabase optional - non-blocking
(async ()=>{
  try{
    const SUPABASE_URL = ''; // add your URL to enable cloud sync
    const SUPABASE_KEY = '';
    if(SUPABASE_URL && window.supabase){
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }
  }catch(e){ console.error('Supabase init failed',e) }
})();
function syncCloud(){
  try{ if(!supabaseClient) return; supabaseClient.from('sim_state').upsert({id:1,data:state,updated_at:new Date()}).then(()=>{}).catch(e=>console.error('sb',e)) }catch(e){console.error(e)}
}

function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
}

// TradingView load after 300ms independent
setTimeout(()=>{
  try{
    if(window.TradingView){
      new TradingView.widget({
        autosize:true,symbol:"BINANCE:BTCUSDT",interval:"1",timezone:"America/Asuncion",
        theme:"dark",style:"1",locale:"en",hide_top_toolbar:true,hide_legend:true,
        allow_symbol_change:false,container_id:"tv_widget",backgroundColor:"#0c1118"
      });
    }
  }catch(e){ console.error('TV',e) }
},300);

async function fetchPrice(){
  try{
    const r = await fetch('https://data-api.binance.vision/api/v3/ticker/price?symbol=BTCUSDT',{cache:'no-store'});
    const j = await r.json();
    const p = parseFloat(j.price);
    state.prev = state.price || p;
    state.price = p;
    if(!state.open24) state.open24 = p;
    const ch = ((p - state.open24)/state.open24*100);
    $('changePct').textContent = (ch>=0?'+':'')+ch.toFixed(2)+'%';
    $('changePct').style.color = ch>=0?'var(--green)':'var(--red)';
    $('price').textContent = fmtP(p).replace('$','');
    $('price').classList.remove('up','down');
    void $('price').offsetWidth;
    $('price').classList.add(p>state.prev?'up':p<state.prev?'down':'');
    checkTriggers();
    render();
  }catch(e){ console.error('price fetch',e) }
}

async function fetchKlines(){
  try{
    const r = await fetch('https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100',{cache:'no-store'});
    const d = await r.json();
    const closes = d.map(k=>parseFloat(k[4]));
    if(closes.length>=21){
      const sma = n => closes.slice(-n).reduce((a,b)=>a+b,0)/n;
      state.sma9 = sma(9);
      state.sma21 = sma(21);
      state.rsi = calcRSI(closes,14);
      $('sma9').textContent = Math.round(state.sma9).toLocaleString();
      $('sma21').textContent = Math.round(state.sma21).toLocaleString();
      $('rsi').textContent = Math.round(state.rsi);
      $('rsi').style.color = state.rsi>70?'var(--red)':state.rsi<30?'var(--green)':'var(--text)';
      const bull = state.sma9>state.sma21;
      $('signal').textContent = bull?'BULL':'BEAR';
      $('signal').style.color = bull?'var(--green)':'var(--red)';
    }
  }catch(e){ console.error('klines',e) }
}

function calcRSI(closes,len){
  if(closes.length<len+1) return 50;
  let gains=0,losses=0;
  for(let i=1;i<=len;i++){ const d=closes[i]-closes[i-1]; if(d>0)gains+=d; else losses-=d; }
  let ag=gains/len, al=losses/len;
  for(let i=len+1;i<closes.length;i++){ const d=closes[i]-closes[i-1]; const g=d>0?d:0; const l=d<0?-d:0; ag=(ag*(len-1)+g)/len; al=(al*(len-1)+l)/len; }
  if(al===0) return 100;
  return 100 - (100/(1+ag/al));
}

function calcUnreal(p){
  if(!state.price) return 0;
  return p.side==='long' ? p.size*(state.price-p.entry)/p.entry : p.size*(p.entry-state.price)/p.entry;
}

function checkTriggers(){
  // limit orders
  state.orders = state.orders.filter(o=>{
    const hit = o.side==='long' ? state.price<=o.limit : state.price>=o.limit;
    if(hit){ executeOpen(o.side,o.size,o.tp,o.sl,true); toast(`Limit ${o.side} filled`); return false; }
    return true;
  });
  // TP/SL
  state.positions.slice().forEach(p=>{
    if(p.tp && ((p.side==='long'&&state.price>=p.tp)||(p.side==='short'&&state.price<=p.tp))) closePosition(p.id,'TP');
    else if(p.sl && ((p.side==='long'&&state.price<=p.sl)||(p.side==='short'&&state.price>=p.sl))) closePosition(p.id,'SL');
  });
}

function executeOpen(side,size,tp,sl,fromOrder=false){
  size = parseFloat(size); if(!size||size<=0) return;
  if(!state.price){ toast('Waiting price...'); return; }
  const fee = size*0.001;
  if(state.balance < size+fee){ toast('Insufficient balance'); return; }
